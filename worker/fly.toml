# fly.toml app configuration file generated for scalesolo-worker on 2026-05-10T19:24:53-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'scalesolo-worker'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # auto_stop_machines = 'suspend' snapshots memory on idle instead of
  # doing a full stop. Resume from suspend takes ~1-3 seconds vs the
  # 30-60s a cold 'stop'-state machine needs to boot Node + ffmpeg +
  # sharp + resvg + register routes. Vercel's 30s function timeout was
  # busting on every cold start with 'stop'; with 'suspend' the worker
  # acks Run dispatches in well under 5s even after hours of idle.
  # Cost is ~the same as 'stop' — Fly only charges memory while
  # suspended (cheap, ~$0.0026/GB-hour for the snapshot), CPU stops
  # accruing.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

  # Per-machine in-flight request caps so Fly autoscaler knows when
  # to spin up another machine. soft_limit = "start booting a new
  # machine once this one has N requests in flight"; hard_limit =
  # "stop routing new requests to this machine once it has N." With
  # performance-4x carrying ~2 ffmpeg jobs cleanly, soft=2 hard=4
  # gives a buffer for short-lived API calls (script_gen,
  # caption_gen) without queueing heavy work behind a saturated box.
  [http_service.concurrency]
    type = 'requests'
    hard_limit = 4
    soft_limit = 2

[[vm]]
  # performance-4x: 4 dedicated vCPUs, 8GB RAM. Roughly 3-4x the
  # ffmpeg throughput of shared-cpu-2x — a 52s 1080p polish drops
  # from ~60-120s on shared to ~12-25s. Cost: ~$0.063/hr running,
  # only billed during active jobs thanks to auto_stop_machines.
  # 8GB headroom handles 2 concurrent encodes (each ~1.5GB) plus
  # the node runtime without OOMing.
  size = 'performance-4x'
  memory = '8gb'
