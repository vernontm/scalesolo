# fly.toml app configuration file generated for scalesolo-worker on 2026-05-10T19:24:53-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'scalesolo-worker'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Suspend on idle for cost. The catch: Fly's "idle" detector watches
  # INBOUND HTTP only, so a long background ffmpeg job (which doesn't
  # generate inbound traffic) would get suspended mid-encode, killing
  # ffmpeg and freezing the workflow forever. Counter-measure: the
  # worker self-pings its own public /healthz every 30s while any
  # background job is in flight (see startKeepAlive / jobStart in
  # index.js). The self-ping leaves the machine, hits Fly's proxy,
  # and comes back in — Fly counts that as inbound traffic and resets
  # the suspend timer.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

  # Concurrency limits bumped so Fly doesn't autoscale a second machine
  # under normal load. We were hitting a multi-machine load-balancing
  # bug where the keepalive ping landed on the wrong machine and the
  # working machine got suspended mid-encode. One performance-4x can
  # carry several concurrent workflows in-process (ffmpeg is the only
  # heavy operation and we cap polish at concurrency 2 inside the
  # workflow runner). Higher limits keep work on one machine.
  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  # performance-4x: 4 dedicated vCPUs, 8GB RAM. Roughly 3-4x the
  # ffmpeg throughput of shared-cpu-2x — a 52s 1080p polish drops
  # from ~60-120s on shared to ~12-25s. Cost: ~$0.063/hr running,
  # only billed during active jobs thanks to auto_stop_machines.
  # 8GB headroom handles 2 concurrent encodes (each ~1.5GB) plus
  # the node runtime without OOMing.
  size = 'performance-4x'
  memory = '8gb'
