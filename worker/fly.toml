# fly.toml app configuration file generated for scalesolo-worker on 2026-05-10T19:24:53-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'scalesolo-worker'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  # HEVC (iPhone H.265) decode is 3-4x more memory-hungry than H.264.
  # 2 GB OOMs on 1080p HEVC clips; 4 GB handles them comfortably.
  # Cost (paid plan): ~$0.012/hr running, auto-stopped when idle =
  # ~$3-8/mo at typical hobby volume.
  size = 'shared-cpu-2x'
  memory = '4gb'
