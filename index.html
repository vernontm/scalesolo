<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ScaleSolo — Scale your brand 10x faster. The AI-native operating system for solopreneurs." />
    <title>ScaleSolo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid flash
      (function() {
        try {
          var t = localStorage.getItem('scalesolo.theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.dataset.theme = t;
          } else {
            document.documentElement.dataset.theme =
              window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
