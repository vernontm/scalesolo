<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ScaleSolo — Scale your brand 10x faster. The AI-native operating system for solopreneurs." />
    <title>ScaleSolo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Display fonts the polish-video editor's live preview can render. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@800&family=Montserrat:wght@800&family=Oswald:wght@700&family=Poppins:wght@800&family=Roboto:wght@900&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid flash. Default is
      // dark — the brand is dark-first and the public landing is locked
      // to dark, so we deliberately ignore prefers-color-scheme here.
      // Users opt into light only via the in-app theme toggle.
      (function() {
        try {
          var t = localStorage.getItem('scalesolo.theme');
          document.documentElement.dataset.theme = (t === 'light') ? 'light' : 'dark';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
